<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>1405 정예진 대한민국 공휴일 검색</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<div class="background-text">1405 정예진</div>
  
  <div class="container">
    <h1>📅 대한민국 공휴일 검색</h1>

    <div class="search-box">
      <input type="number" id="year" placeholder="년도 (예: 2026)">
      <input type="number" id="month" placeholder="월 (예: 05)">
      <button onclick="searchHolidays()">검색</button>
      <button onclick="toggleDarkMode()">🌙 다크모드</button>
    </div>

    <div id="result" class="grid"></div>
  </div>

<script src="script.js"></script>
</body>
</html>
